artifacts = ["/app/report.json"]

[task]
name = "dynamo/log-report"
description = "Parse an Apache-style access log and generate a structured JSON report."

[metadata]
category = "data_processing_and_etl"
subcategory = "text_processing"
task_objective = ["transform", "aggregate", "analyze"]
artifact_type = ["json_report"]
expert_time_estimate_hours = 0.3
difficulty_explanation = "Aggregate log metrics into structured JSON output."
solution_explanation = "Count requests, unique IPs, and most frequent path."
verification_explanation = "Validate correctness of JSON fields, not file existence."

[verifier]
timeout_sec = 120.0

[agent]
timeout_sec = 120.0

[environment]
build_timeout_sec = 600.0
cpus = 1
memory_mb = 2048
storage_mb = 10240
gpus = 0
allow_internet = false
mcp_servers = []